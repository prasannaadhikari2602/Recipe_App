{% extends 'base.html' %}
{% load static %}

{% block title %}Add Recipe{% endblock %}

{% block content %}

<main class="min-h-screen bg-gray-100 flex items-center justify-center py-10 px-4">

    <form method="POST"
          enctype="multipart/form-data"
          class="w-full max-w-3xl bg-white shadow-xl rounded-3xl p-8 md:p-10 space-y-6">

        {% csrf_token %}

        <!-- Heading -->
        <div class="text-center">
            <h1 class="text-3xl font-bold text-gray-800">
                Add New Recipe
            </h1>

            <p class="text-gray-500 mt-2">
                Share your delicious recipe
            </p>
        </div>

        <!-- Recipe Title -->
        <div>
            <label class="block text-sm font-semibold text-gray-700 mb-2">
                Recipe Title
            </label>

            <input type="text"
                   name="title"
                   placeholder="Enter recipe title"
                   required
                   class="w-full border border-gray-300 rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-orange-400 focus:border-orange-400 transition">
        </div>

        <!-- Description -->
        <div>
            <label class="block text-sm font-semibold text-gray-700 mb-2">
                Description
            </label>

            <textarea name="description"
                      rows="4"
                      placeholder="Write recipe description"
                      required
                      class="w-full border border-gray-300 rounded-xl px-4 py-3 resize-none focus:outline-none focus:ring-2 focus:ring-orange-400 focus:border-orange-400 transition"></textarea>
        </div>

        <!-- Ingredients -->
        <div>
            <label class="block text-sm font-semibold text-gray-700 mb-2">
                Ingredients
            </label>

            <textarea name="ingredients"
                      rows="5"
                      placeholder="List ingredients"
                      required
                      class="w-full border border-gray-300 rounded-xl px-4 py-3 resize-none focus:outline-none focus:ring-2 focus:ring-orange-400 focus:border-orange-400 transition"></textarea>
        </div>

        <!-- Instructions -->
        <div>
            <label class="block text-sm font-semibold text-gray-700 mb-2">
                Instructions
            </label>

            <textarea name="instruction"
                      rows="6"
                      placeholder="Write cooking instructions"
                      required
                      class="w-full border border-gray-300 rounded-xl px-4 py-3 resize-none focus:outline-none focus:ring-2 focus:ring-orange-400 focus:border-orange-400 transition"></textarea>
        </div>

        <!-- Total Time -->
        <div>
            <label class="block text-sm font-semibold text-gray-700 mb-2">
                Total Time
            </label>

            <input type="text"
                   name="total_time"
                   placeholder="e.g. 30 mins"
                   required
                   class="w-full border border-gray-300 rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-orange-400 focus:border-orange-400 transition">
        </div>

        <!-- Upload Image -->
        <div>
            <label class="block text-sm font-semibold text-gray-700 mb-2">
                Recipe Image
            </label>

            <input type="file"
                   name="image"
                   required
                   class="w-full border border-gray-300 rounded-xl px-4 py-3 bg-gray-50 cursor-pointer">
        </div>

        <!-- Buttons -->
        <div class="flex flex-col sm:flex-row gap-4 pt-4">

            <button type="submit"
                    class="flex-1 bg-orange-500 hover:bg-orange-600 text-white font-semibold py-3 rounded-xl transition duration-200 shadow-md">
                Add Recipe
            </button>

            <a href="{% url 'recipe_list' %}"
               class="flex-1 text-center bg-gray-200 hover:bg-gray-300 text-gray-700 font-semibold py-3 rounded-xl transition duration-200">
                Cancel
            </a>

        </div>

    </form>

</main>

{% endblock %}
